server:
  port: 8085

maker:
  bybit:
    websocket:
      enabled: true
      # Mainnet public linear ticker stream.
      url: wss://stream.bybit.com/v5/public/linear
      symbols: BTCUSDT,ETHUSDT
      reconnect-delay-ms: 3000
  random-order:
    enabled: true
    fixed-delay-ms: 1000
    account-api-base-url: http://localhost:8081
    market-api-base-url: http://localhost:8082
    order-api-base-url: http://localhost:8080
    orderbook-level: 1
    min-available-quote: 1000
    min-available-base: 0.5
    ladder-levels: 8
    ladder-step-bps: 10
    min-ladder-notional-usdt: 120
    max-ladder-notional-usdt: 500
    overlap-levels: 2
    overlap-bps: 2
