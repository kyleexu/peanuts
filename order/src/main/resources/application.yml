server:
  port: 8080

gateway:
  account-lock:
    timeout-ms: 3000
  aeron:
    enabled: true
    channel: aeron:ipc
    stream-id: 2001
    account-lock-request-stream-id: 2101
    account-lock-response-stream-id: 2102
  random-order:
    enabled: true
    fixed-delay-ms: 1000
    account-api-base-url: http://localhost:8081
    market-api-base-url: http://localhost:8082
    orderbook-level: 1
    min-available-quote: 1000
    min-available-base: 0.5
    ladder-levels: 8
    ladder-step-bps: 10
    min-ladder-notional-usdt: 120
    max-ladder-notional-usdt: 500
    overlap-levels: 2
    overlap-bps: 2
