<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Data WebSocket Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 15px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .controls input,
        .controls button {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .controls button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        .controls button:hover {
            background: #764ba2;
        }

        .controls button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .status.connected {
            background: #4caf50;
            color: white;
        }

        .status.disconnected {
            background: #f44336;
            color: white;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .panel h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .message-log {
            height: 400px;
            overflow-y: auto;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .message-item {
            padding: 8px;
            margin: 5px 0;
            border-left: 3px solid #667eea;
            background: white;
            border-radius: 3px;
            word-break: break-all;
        }

        .message-item.ticker {
            border-left-color: #4caf50;
        }

        .message-item.candle {
            border-left-color: #ff9800;
        }

        .ticker-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .ticker-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
        }

        .ticker-item label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .ticker-item .value {
            font-size: 16px;
            color: #333;
            font-weight: bold;
        }

        .candle-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 12px;
        }

        .candle-table th,
        .candle-table td {
            padding: 8px;
            text-align: right;
            border-bottom: 1px solid #e0e0e0;
        }

        .candle-table th {
            background: #f0f0f0;
            font-weight: bold;
            color: #333;
        }

        .candle-table tr:hover {
            background: #f5f5f5;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            .ticker-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .controls input,
            .controls button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Market Data Real-Time WebSocket</h1>
            <div class="controls">
                <input type="text" id="wsUrl" value="ws://localhost:8080/ws/market" placeholder="WebSocket URL">
                <button id="connectBtn" onclick="connect()">Connect</button>
                <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
                <span id="status" class="status disconnected">● Disconnected</span>
            </div>
        </div>

        <div class="content">
            <!-- Ticker Panel -->
            <div class="panel">
                <h2>📊 Latest Ticker</h2>
                <div id="tickerContainer">
                    <p style="color: #999; text-align: center; padding: 20px;">等待数据...</p>
                </div>
            </div>

            <!-- Candle Panel -->
            <div class="panel">
                <h2>📈 Latest Candles</h2>
                <div id="candleContainer">
                    <p style="color: #999; text-align: center; padding: 20px;">等待数据...</p>
                </div>
            </div>
        </div>

        <!-- Message Log Panel -->
        <div class="panel">
            <h2>📝 Message Log</h2>
            <button onclick="clearLog()" style="margin-bottom: 10px; float: right;">Clear Log</button>
            <div class="message-log" id="messageLog"></div>
        </div>
    </div>

    <script>
        let ws = null;
        const tickerData = {};
        const candleData = {};

        function connect() {
            const url = document.getElementById('wsUrl').value;
            if (!url) {
                alert('Please enter WebSocket URL');
                return;
            }

            try {
                ws = new WebSocket(url);
                ws.onopen = onOpen;
                ws.onmessage = onMessage;
                ws.onerror = onError;
                ws.onclose = onClose;
            } catch (e) {
                addLog('连接失败: ' + e.message, 'error');
            }
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function onOpen() {
            updateStatus(true);
            addLog('✓ WebSocket 已连接', 'info');
        }

        function onMessage(event) {
            try {
                const message = JSON.parse(event.data);
                addLog(JSON.stringify(message, null, 2), message.type);

                if (message.type === 'ticker' && message.ticker) {
                    updateTickerUI(message.ticker);
                } else if (message.type === 'candle' && message.candle) {
                    updateCandleUI(message.candle);
                }
            } catch (e) {
                addLog('解析消息失败: ' + e.message, 'error');
            }
        }

        function onError(event) {
            addLog('✗ WebSocket 错误: ' + event, 'error');
        }

        function onClose() {
            updateStatus(false);
            addLog('✗ WebSocket 已断开连接', 'info');
        }

        function updateStatus(connected) {
            const status = document.getElementById('status');
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');

            if (connected) {
                status.textContent = '●  Connected';
                status.className = 'status connected';
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
            } else {
                status.textContent = '●  Disconnected';
                status.className = 'status disconnected';
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
            }
        }

        function updateTickerUI(ticker) {
            const contract = ticker.contract || 'UNKNOWN';
            tickerData[contract] = ticker;

            let html = '<div class="ticker-grid">';
            for (const [contract, data] of Object.entries(tickerData)) {
                html += `
                    <div class="ticker-item">
                        <label>Contract: ${contract}</label>
                        <div class="value">${(data.lastPrice || 0).toFixed(2)}</div>
                        <div style="font-size: 11px; color: #999; margin-top: 5px;">
                            H: ${(data.highPrice || 0).toFixed(2)} | 
                            L: ${(data.lowPrice || 0).toFixed(2)} | 
                            V: ${(data.volume || 0).toFixed(0)}
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            document.getElementById('tickerContainer').innerHTML = html;
        }

        function updateCandleUI(candle) {
            const key = (candle.contract || 'UNKNOWN') + '_' + (candle.interval || 'UNKNOWN');
            candleData[key] = candle;

            let html = '<table class="candle-table"><thead><tr>' +
                '<th>Contract</th><th>Interval</th><th>Open</th><th>High</th><th>Low</th><th>Close</th><th>Volume</th>' +
                '</tr></thead><tbody>';

            for (const data of Object.values(candleData)) {
                html += `
                    <tr>
                        <td>${data.contract || 'N/A'}</td>
                        <td>${data.interval || 'N/A'}</td>
                        <td>${(data.open || 0).toFixed(2)}</td>
                        <td>${(data.high || 0).toFixed(2)}</td>
                        <td>${(data.low || 0).toFixed(2)}</td>
                        <td>${(data.close || 0).toFixed(2)}</td>
                        <td>${(data.volume || 0).toFixed(0)}</td>
                    </tr>
                `;
            }
            html += '</tbody></table>';
            document.getElementById('candleContainer').innerHTML = html;
        }

        function addLog(message, type = 'message') {
            const log = document.getElementById('messageLog');
            const item = document.createElement('div');
            item.className = 'message-item ' + type;
            item.textContent = new Date().toLocaleTimeString() + ' | ' + message;
            log.appendChild(item);
            log.scrollTop = log.scrollHeight;

            // 保持最多 100 条消息
            if (log.children.length > 100) {
                log.removeChild(log.firstChild);
            }
        }

        function clearLog() {
            document.getElementById('messageLog').innerHTML = '';
        }

        // 页面加载时设置事件监听
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('wsUrl').focus();
        });
    </script>
</body>

</html>
